<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: url(https://www.emasjid.id/website/upload/picture/76346646rrrrrrr.jpg);
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            padding-bottom: 100px;
        }

        /* HEADER */
        header {
            background-color: rgba(113, 212, 212, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            gap: 15px;
            z-index: 100;
        }

        header h1 {
            color: white;
        }

        .nav {
            background-color: #08c9ff;
            border-radius: 20px;
            padding: 5px;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        a {
            display: inline-block;
            color: black;
            border-radius: 10px;
            padding: 8px 14px;
            text-decoration: none;
            margin: 3px;
            transition: 0.3s ease;
            font-weight: bold;
        }

        a:hover {
            background-color: aliceblue;
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 4px 20px gray;
        }

        /* CONTENT */
        .judul {
            display: block;
            padding: 25px;
            color: aliceblue;
            width: 90%;
            max-width: 400px;
            background-color: rgba(113, 212, 212, 0.7);
            backdrop-filter: blur(3px);
            border-radius: 20px;
            transition: 0.5s ease;
            margin: 20px;
        }

        .judul:hover {
            transform: translateX(20px);
            background-color: aquamarine;
        }

        .menu {
            display: block;
            background-color: rgba(113, 212, 212, 0.7);
            width: 90%;
            max-width: 350px;
            padding: 20px;
            border-radius: 20px;
            margin: 30px 20px 30px auto;
            transition: 0.5s ease;
            backdrop-filter: blur(3px);
        }

        .menu a {
            background-color: #08c9ff;
        }

        .menu:hover {
            transform: translateX(-20px);
            background-color: aquamarine;
        }

        .menu h2 {
            margin-bottom: 10px;
        }

        .menu p {
            margin-bottom: 10px;
        }

        .menu li {
            margin: 10px 0;
        }

        /* FOOTER */
        .footer {
            width: 100%;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin-top: auto;
        }

        /* LOADING */
        .loading {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 9999;

            animation: hilang 3s forwards;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top: 6px solid #08c9ff;
            border-radius: 50%;

            animation: putar 1s linear infinite;
        }

        .loading h2 {
            margin-top: 15px;
        }

        @keyframes putar {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes hilang {
            0% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* TABLET */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            .nav {
                width: 100%;
            }

            nav {
                width: 100%;
            }

            a {
                flex: 1;
            }

            .judul,
            .menu {
                margin: 20px auto;
            }

            .judul:hover,
            .menu:hover {
                transform: none;
            }
        }

        /* HP */
        @media (max-width: 480px) {
            header h1 {
                font-size: 24px;
            }

            .judul h1 {
                font-size: 28px;
            }

            .judul h2 {
                font-size: 18px;
            }

            a {
                font-size: 14px;
                padding: 8px;
            }

            .menu {
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="loading">
        <div class="loader"></div>
        <h2>Loading...</h2>
    </div>

    <header>
        <h1>🏠Home</h1>

        <div class="nav">
            <nav>
                <a href="index.html">🏠Home</a>
                <a href="portofolio.html">🙍🏻‍♂️Info</a>
            </nav>
        </div>
    </header>

    <div class="judul">
        <h1>Selamat Datang</h1>
        <h2>Di Website ke 2 saya 👋🏻</h2>
    </div>

    <div class="menu">
        <h2>Halaman</h2>

        <p>Halaman yang akan ditampilkan :</p>

        <ul type="none">
            <li>👉🏻 <a href="zaman.html">Zaman</a></li>
            <li>👉🏻 <a href="dimensi.html">Dimensi</a></li>
        </ul>
    </div>

    <div class="footer">
        <footer>
            <p>&copy; Iyoss 2026</p>
        </footer>
    </div>

</body>

</html>
