<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0px;
            min-height: 100vh;
            background-image: url(https://www.emasjid.id/website/upload/picture/76346646rrrrrrr.jpg);
            background-size: 100% 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: 100px;
        }

        header {
            background-color: rgb(113, 212, 212, 0.4);
            display: flex;
            justify-content: space-between;
            padding: 20px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
        }

        .nav {
            background-color: #08c9ff;
            border-radius: 20px;
            height: 40px;
        }

        .dt {
            display: inline-block;
            padding-right: 5px;

        }

        a {
            display: inline-block;
            color: black;
            border-radius: 10px;
            padding: 5px;
            text-decoration: none;

            margin: 3px;
            transition: 0.3s ease;
        }

        a:hover {
            background-color: aliceblue;
            transform: translateY(-10px)scale(1.03);
            box-shadow: 0 4px 20px gray;
        }


        .judul {
            display: block;
            padding: 20px;
            color: aliceblue;
            width: 200px;
            background-color: rgb(113, 212, 212);
            backdrop-filter: blur(1px);
            border-radius: 20px;
            transition: 1s ease;
        }

        .judul:hover {
            transform: translateX(50%) scale(1.0);
            cursor: default;
            background-color: aquamarine;
        }

        .menu {
            display: block;
            background-color: rgb(113, 212, 212);
            width: 250px;
            padding: 20px;
            border-radius: 20px;
            align-items: center;
            margin: 30px;
            margin-left: auto;
            transition: 1s ease;

        }

        .menu a {
            background-color: #08c9ff;
        }

        .menu:hover {
            transform: translateX(-50%) scale(1.0);
            cursor: default;
            background-color: aquamarine;
        }

        .card {
            display: block;
            background-color: rgb(113, 212, 212);
            width: 250px;
            padding: 20px;
            border-radius: 20px;
            align-items: center;
            margin: 30px;
            margin-right: auto;
            transition: 1s ease;

        }

        .card:hover {
            transform: translateX(-50%) scale(1.0);
            cursor: default;
            background-color: aquamarine;
        }

        .card2 {
            display: block;
            background-color: rgb(113, 212, 212);
            width: 250px;
            padding: 20px;
            border-radius: 20px;
            align-items: center;
            margin: 30px;
            margin-right: auto;
            transition: 1s ease;

        }

        .card2:hover {
            transform: translateX(50%) scale(1.0);
            cursor: default;
            background-color: aquamarine;
        }


        .footer {
            width: 100%;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            position: fixed;
            bottom: 0;
            box-sizing: border-box;
        }

        .loading {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 9999;

            animation: hilang 3s forwards;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top: 6px solid #08c9ff;
            border-radius: 50%;

            animation: putar 1s linear infinite;
        }

        @keyframes putar {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes hilang {
            0% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>

<body>


    <div class="loading">
        <div class="loader"></div>
        <h2>Loading...</h2>
    </div>
    <header>
        <h1>🏠Home</h1>
        <div class="nav">
            <nav>
                <a href="" class="link">🏠Home</a>
                <a href="portofolio.html" class="link">🙍🏻‍♂️Info</a>
            </nav>
        </div>
    </header>
    <div class="judul">
        <h1>Selamat datang</h1>
        <h2>Di Website ke 2 saya👋🏻</h2>
    </div>
    <div class="menu">
        <H2>Halaman</H2>
        <p>Halaman yang akan di tampilkan :</p>
        <ul type='none'>
            <li>👉🏻<a href="zaman.html">Zaman</a></li>
            <li>👉🏻<a href="ilmu.html">Dimensi</a></li>
        </ul>
    </div>
    <div class="card2">
        <h2>Motivasi Hari ini</h2>
        <p>"Setiap eror adalah langkah menuju program yang lebih kuat"</p>

    </div>
    <div class="footer">
        <footer>
            <p>&copy; Iyoss 2026</p>
        </footer>
    </div>

</body>

</html>
